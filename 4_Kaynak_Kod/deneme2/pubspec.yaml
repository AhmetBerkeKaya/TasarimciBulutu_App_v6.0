name: deneme2
description: "Türkiye Odaklı Yetkinlik Geliştirme ve Proje Eşleştirme Platformu"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0' # SDK versiyonunu güncel tutmak iyi bir pratik

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- PAKET DEĞİŞİKLİKLERİ ---
  flutter_inappwebview: ^6.0.0 # YENİ EKLENDİ
  # model_viewer_plus: ^1.7.0  # KALDIRILDI
  # --- PAKET DEĞİŞİKLİKLERİ SONU ---

  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  intl: ^0.20.2 # Son sürüme güncellendi
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  timeago: ^3.6.1
  flutter_rating_bar: ^4.0.1
  intl_phone_field: ^3.2.0
  file_picker: ^8.0.5
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.3
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  google_sign_in: ^6.2.1
  pinput: ^5.0.1
  mime: ^1.0.5 # Son sürüme güncellendi
  archive: ^3.5.1
  http_parser: ^4.0.2 # Son sürüme güncellendi
  dropdown_search: ^5.0.3
  badges: ^3.1.2
  share_plus: ^10.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 # Son sürüme güncellendi

flutter:
  uses-material-design: true

  # --- ASSET DEĞİŞİKLİKLERİ ---
  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
    - assets/html/ # YENİ HTML DOSYASI İÇİN KLASÖR
  # --- ASSET DEĞİŞİKLİKLERİ SONU ---

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  TasarimciBulutu Backend: Ana API, 3D Model Processor and Recommendation Engine

Globals:
  Function:
    Runtime: python3.12
    Architectures: [x86_64]
    VpcConfig:
      SecurityGroupIds: !Split [',', !Ref SecurityGroupIds]
      SubnetIds: !Ref SubnetIds
    Tracing: Active # Bu, tüm fonksiyonlar için X-Ray'i açar
    Environment:
      Variables:
        DATABASE_URL: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:DatabaseUrl}}'
        SECRET_KEY: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:SecretKey}}'
        ENCRYPTION_KEY: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:EncryptionKey}}'
        MAIL_USERNAME: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:MailUsername}}'
        MAIL_PASSWORD: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:MailPassword}}'
        APS_CLIENT_ID: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:ApsClientId}}'
        APS_CLIENT_SECRET: !Join
          - ''
          - - '{{resolve:secretsmanager:tasarimcibulutu/secrets:SecretString:ApsClientSecret}}'
        
        MAIL_FROM: !Ref MailFrom
        MAIL_PORT: !Ref MailPort
        MAIL_SERVER: !Ref MailServer
        AWS_S3_BUCKET_NAME: !Ref S3BucketName

Parameters:
  S3BucketName:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  SecurityGroupIds:
    Type: String
  MailFrom:
    Type: String
  MailPort:
    Type: Number
  MailServer:
    Type: String
  
Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: TasarimciBulutu-Api
      CodeUri: .
      Handler: app.main.handler
      Timeout: 30
      MemorySize: 512
      Policies: 
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:tasarimcibulutu/secrets-*"
      Events:
        ApiRoot:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref ServerlessApi
        ApiBase:
          Type: Api
          Properties:
            Path: /
            Method: ANY
            # DÜZELTİLDİ: 'ServerServerlessApi' değil, 'ServerlessApi'
            RestApiId: !Ref ServerlessApi

  ServerlessApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS,PATCH'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'" 
      TracingEnabled: true
      
  ModelProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: TasarimciBulutu-ModelProcessor
      CodeUri: .
      Handler: model_processor.lambda_function.lambda_handler
      Timeout: 900
      MemorySize: 1024
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:tasarimcibulutu/secrets-*"

  RecommenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: TasarimciBulutu-Recommender
      CodeUri: .
      Handler: recommender_lambda.handler.handler
      Timeout: 300
      MemorySize: 256
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:tasarimcibulutu/secrets-*"
      Events:
        ScheduledTrigger:
          Type: Schedule
          Properties:
            Name: TasarimciBulutu-Recommender-Schedule
            Description: "Proje önerilerini saatte bir hesaplayan zamanlayıcı."
            Schedule: "rate(1 hour)"
            Enabled: True
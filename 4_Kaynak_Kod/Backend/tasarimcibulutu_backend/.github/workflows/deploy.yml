# /.github/workflows/deploy.yml

name: SAM Deploy to Production

# Bu robotu ne zaman çalıştıracağımızı belirler:
on:
  push:
    branches:
      - main  # Sadece 'main' branch'ine bir kod itildiğinde (push) çalışır.
      # (Eğer 'master' gibi farklı bir ana branch kullanıyorsan, burayı onunla değiştir)

jobs:
  # 'deploy' adında bir iş tanımlıyoruz
  deploy:
    runs-on: ubuntu-latest # Robotun işletim sistemi (Linux)
    
    steps:
      # 1. Adım: Kodu GitHub'dan robotun sanal makinesine indir
      - name: Kodu indir (Checkout)
        uses: actions/checkout@v4

      # 2. Adım: Python 3.12'yi kur (template.yaml ile aynı olmalı)
      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Adım: AWS SAM CLI'ı kur (sam build/deploy komutları için)
      - name: AWS SAM CLI kur
        uses: aws-actions/setup-sam@v2

      # 4. Adım: AWS hesabımıza giriş yap (GitHub Secrets'taki anahtarları kullanarak)
      - name: AWS Kimlik Bilgilerini Yapılandır
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 # samconfig.toml dosyanızdaki bölge

      # 5. Adım: Bağımlılıkları kur ve sam build çalıştır
      - name: SAM Build
        run: sam build

      # 6. Adım: sam deploy çalıştır (Onay beklemeden)
      - name: SAM Deploy
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
        # --no-confirm-changeset: Robota "Deploy edilsin mi? [y/N]" diye sorma, direkt et.
        # --no-fail-on-empty-changeset: Altyapıda değişiklik yoksa hata verme, başarılı say.